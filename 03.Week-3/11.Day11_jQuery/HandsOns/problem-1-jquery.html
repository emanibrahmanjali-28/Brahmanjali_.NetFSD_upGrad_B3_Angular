<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Form</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js"></script>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f9f9f9;
        }

        h2 {
            color: #333;
        }

        form {
            background-color: #fff;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            text-align: left;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        .error {
            color: #ff0000;
            font-weight: bold;
        }

        .success {
            color: #008000;
            font-weight: bold;
        }

        #message {
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h2>Student Feedback</h2>

    <form id="feedback">

        <label for="name">Name:</label>
        <input type="text" id="name" autocomplete="off">

        <label for="email">Email:</label>
        <input type="email" id="email" autocomplete="off">

        <label for="rating">Course Rating:</label>
        <select id="rating">
            <option value="">Select Rating</option>
            <option value="Excellent">Excellent</option>
            <option value="Good">Good</option>
            <option value="Average">Average</option>
            <option value="Poor">Poor</option>
        </select>

        <label for="comments">Comments:</label>
        <textarea id="comments" rows="4"></textarea>

        <button type="button" id="submitBtn">Submit</button>
    </form>

    <div id="message"></div>

<script>
$(document).ready(function () {

    $("#submitBtn").click(function () {

        var name = $("#name").val().trim();
        var email = $("#email").val().trim();

        $("#message").html(""); // Clear previous messages

        // Validation
        if (name === "" || email === "") {
            $("#message").html("<p class='error'>Please enter Name and Email.</p>");
        } 
        else if (!email.includes("@")) {  // Email must contain @
            $("#message").html("<p class='error'>Email must contain '@' symbol.</p>");
        } 
        else {
            $("#message").html("<p class='success'>Thank you for your feedback!</p>");
            $("#feedback").trigger("reset"); // Reset form
        }

    });

});
</script>

</body>
</html>
